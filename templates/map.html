<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map — Mapping Party Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/map.css">
</head>
<body class="map-page">

  <div id="map"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="back-link">← Back</a>
      <div class="sidebar-title-row">
        <h2 class="sidebar-title" id="project-title">Loading…</h2>
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">▾</button>
      </div>
      <div id="project-link-container" hidden>
        <a href="#" id="project-link" class="project-link" target="_blank" rel="noopener"></a>
      </div>
    </div>

    <div class="sidebar-body" id="sidebar-body">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-claimed">—</div>
          <div class="stat-label">Claimed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-free">—</div>
          <div class="stat-label">Free</div>
        </div>
      </div>

      <div class="histogram" id="histogram">
        <!-- bars rendered by JS -->
      </div>

      <div class="legend">
        <div class="legend-title">Score Legend</div>
        <div class="legend-items">
          <div class="legend-item"><span class="legend-swatch" style="background:transparent;border:2px solid #555"></span>0 — Not scored</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#e74c3c"></span>1 — Poor</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#e67e22"></span>2 — Fair</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#f1c40f"></span>3 — Good</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#2ecc71"></span>4 — Very Good</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#27ae60"></span>5 — Excellent</div>
        </div>
        <div class="legend-title" style="margin-top:0.75rem">Outline Legend</div>
        <div class="legend-items">
          <div class="legend-item"><span class="legend-line thin black"></span>Unclaimed</div>
          <div class="legend-item"><span class="legend-line thick blue"></span>Claimed by other</div>
          <div class="legend-item"><span class="legend-line thick red"></span>Claimed by you</div>
        </div>
      </div>

      <div id="user-bar" class="user-bar">
        <!-- populated by JS -->
      </div>

      <div id="owner-bar" class="owner-bar" hidden>
        <a id="edit-project-link" href="#" class="btn btn-sm btn-ghost">⚙ Edit Project</a>
      </div>
    </div>
  </aside>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/js/main.js"></script>
  <script src="/static/js/map.js"></script>
  <script>
    const projectId = parseInt(location.pathname.split("/")[2]);
    MPT.initMapPage(projectId);
  </script>
</body>
</html>
